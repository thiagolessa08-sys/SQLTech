<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Login — SQLTech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* ── Layout ── */
.login-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
}

/* ── Right panel (image) ── */
.login-left{
  position:relative;
  overflow:hidden;
}
.login-left img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.login-left::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,20,.75) 0%, rgba(0,0,20,.2) 45%, transparent 70%);
  pointer-events:none;
}
.img-caption{
  position:absolute;
  bottom:40px;
  left:36px;
  right:36px;
  z-index:2;
}
.img-caption h2{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:22px;
  font-weight:800;
  color:#fff;
  letter-spacing:.06em;
  text-transform:uppercase;
  line-height:1.2;
  margin-bottom:10px;
  text-shadow:0 2px 12px rgba(0,0,0,.4);
}
.img-caption p{
  font-size:13px;
  color:rgba(255,255,255,.88);
  line-height:1.65;
  max-width:340px;
  text-shadow:0 1px 6px rgba(0,0,0,.4);
}

/* ── Right panel ── */
.login-right{
  background:#f0f2f5;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 32px;
}
.login-card{
  background:#fff;
  border-radius:24px;
  padding:44px 40px;
  width:100%;
  max-width:420px;
  box-shadow:0 4px 32px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
}
.card-logo{
  width:130px;height:auto;
  display:block;
  margin:0 auto 28px;
}
.card-title{
  font-family:'Instrument Serif',serif;
  font-size:28px;
  font-weight:400;
  letter-spacing:-0.02em;
  color:#0f172a;
  text-align:center;
  margin-bottom:6px;
}
.card-sub{
  font-size:13.5px;
  color:#64748b;
  text-align:center;
  margin-bottom:32px;
}

/* ── Form ── */
.form-group{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:18px;
}
.form-label{
  font-size:12.5px;
  font-weight:700;
  color:#374151;
  letter-spacing:.02em;
}
.input-wrap{
  position:relative;
  display:flex;
  align-items:center;
}
.input-wrap svg{
  position:absolute;
  left:14px;
  color:#94a3b8;
  flex-shrink:0;
  pointer-events:none;
}
.form-input{
  width:100%;
  padding:12px 14px 12px 42px;
  font-family:inherit;
  font-size:13.5px;
  color:#0f172a;
  background:#f8fafc;
  border:1.5px solid #e2e8f0;
  border-radius:12px;
  outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.form-input:focus{
  border-color:oklch(0.48 0.18 250);
  background:#fff;
  box-shadow:0 0 0 3px oklch(0.48 0.18 250 / .12);
}
.form-input::placeholder{color:#94a3b8}
.input-toggle{
  position:absolute;
  right:12px;
  background:none;
  border:none;
  cursor:pointer;
  color:#94a3b8;
  padding:4px;
  display:grid;
  place-items:center;
  transition:color .15s;
}
.input-toggle:hover{color:#475569}

/* ── Error ── */
.login-error{
  display:flex;
  align-items:center;
  gap:8px;
  background:#fef2f2;
  border:1px solid #fecaca;
  border-radius:10px;
  padding:10px 14px;
  font-size:12.5px;
  color:#dc2626;
  font-weight:500;
  margin-bottom:18px;
}

/* ── Submit button ── */
.btn-login{
  width:100%;
  padding:13px;
  background:oklch(0.48 0.18 250);
  color:#fff;
  border:none;
  border-radius:12px;
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:background .15s, transform .08s, box-shadow .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:8px;
  box-shadow:0 4px 14px oklch(0.48 0.18 250 / .35);
}
.btn-login:hover{background:oklch(0.38 0.16 250);box-shadow:0 6px 20px oklch(0.48 0.18 250 / .45)}
.btn-login:active{transform:translateY(1px)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}

/* ── Footer ── */
.card-footer{
  margin-top:28px;
  text-align:center;
  font-size:11.5px;
  color:#94a3b8;
}

/* ── Responsive ── */
@media(max-width:768px){
  .login-wrap{grid-template-columns:1fr}
  .login-left{display:none}
  .login-right{background:#fff;padding:24px 20px}
  .login-card{box-shadow:none;padding:32px 24px}
}
</style>
</head>
<body>
<div class="login-wrap">

  <!-- ── Painel esquerdo (formulário) ── -->
  <div class="login-right">

    <div class="login-card">
      <img src="/static/img/logo-light.png" alt="SQLTech" class="card-logo"/>
      <h2 class="card-title">Bem-vindo</h2>
      <p class="card-sub">Acesse o painel de orçamento municipal</p>

      {% if error %}
      <div class="login-error">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M22 6l-10 7L2 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com.br"
              value="{{ request.form.get('email', '') }}"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="input-toggle" onclick="togglePwd()" title="Mostrar/ocultar senha">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-login" type="submit" id="btnLogin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Entrar
        </button>
      </form>

      <div class="card-footer">
        © 2026 SQLTech · Orçamento Municipal
      </div>
    </div>
  </div>

  <!-- ── Painel direito (imagem) ── -->
  <div class="login-left">
    <img src="/static/img/login-bg.jpg" alt="SQLTech"/>
    <div class="img-caption">
      <h2>Transformação Fiscal<br/>do seu Município</h2>
      <p>O <strong>Analytics Municipal</strong> é mais que uma plataforma; é o motor de transformação que sua gestão precisa.</p>
    </div>
  </div>

</div>

<script>
function togglePwd(){
  const inp = document.getElementById('password');
  const ico = document.getElementById('eyeIcon');
  if(inp.type === 'password'){
    inp.type = 'text';
    ico.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
  } else {
    inp.type = 'password';
    ico.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>';
  }
}

document.getElementById('loginForm').addEventListener('submit', function(){
  const btn = document.getElementById('btnLogin');
  btn.disabled = true;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="animation:spin .8s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Entrando…';
});
</script>
<style>
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</body>
</html>
